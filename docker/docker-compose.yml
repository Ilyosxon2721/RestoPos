version: '3.8'

services:
  # PHP-FPM Application
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: restopos_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - restopos
    depends_on:
      - mysql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: restopos_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ../:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - restopos
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: restopos_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-restopos}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-restopos}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - restopos

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: restopos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - restopos

  # Node.js for Frontend (Nuxt)
  node:
    image: node:20-alpine
    container_name: restopos_node
    working_dir: /var/www/frontend
    volumes:
      - ../frontend:/var/www/frontend
    ports:
      - "3000:3000"
      - "24678:24678"
    command: sh -c "npm install && npm run dev"
    networks:
      - restopos
    profiles:
      - frontend

  # Laravel Reverb (WebSockets)
  reverb:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: restopos_reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8085:8080"
    networks:
      - restopos
    depends_on:
      - app
      - redis
    profiles:
      - websocket

  # Queue Worker
  queue:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: restopos_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../:/var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - restopos
    depends_on:
      - app
      - redis
    profiles:
      - worker

  # Scheduler
  scheduler:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: restopos_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../:/var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    networks:
      - restopos
    depends_on:
      - app
    profiles:
      - worker

  # phpMyAdmin (optional)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: restopos_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-restopos}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - restopos
    depends_on:
      - mysql
    profiles:
      - dev

  # Mailpit (local email testing)
  mailpit:
    image: axllent/mailpit
    container_name: restopos_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - restopos
    profiles:
      - dev

networks:
  restopos:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
